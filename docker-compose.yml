version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: achat_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=achatdb
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    # ✅ Port non exposé à l'extérieur — MySQL accessible uniquement en interne
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - achat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./achat
      dockerfile: Dockerfile
    container_name: achat-container
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      # ✅ allowPublicKeyRetrieval=true activé pour autoriser la connexion MySQL
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:3306/achatdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      mysqldb:
        condition: service_healthy
    networks:
      - achat-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  prometheus:
    image: prom/prometheus:latest
    container_name: achat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    networks:
      - achat-network
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: achat-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - achat-network
    depends_on:
      - prometheus

networks:
  achat-network:
    driver: bridge

volumes:
  db_data:
  grafana_data: