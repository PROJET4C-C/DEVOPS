version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: achat_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=achatdb
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    # ✅ Port non exposé à l'extérieur — MySQL accessible uniquement en interne
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - achat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./achat
      dockerfile: Dockerfile
    container_name: achat-container
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      # ✅ allowPublicKeyRetrieval supprimé
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:3306/achatdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      mysqldb:
        condition: service_healthy
    networks:
      - achat-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  achat-network:
    driver: bridge

volumes:
  db_data: